case_study:
  background:
    en:
      - PolyOCR is a multilingual OCR pipeline that reads text from images, detects its language, translates it, and — for use cases like manga — inpaints the original text and renders the translation back in place.
      - It ships as two artifacts that share one pipeline — a headless npm package that does all the real work, and a thin Electron desktop app that is purely a UI consumer of it. The package runs unchanged in a browser extension, a Node CLI, a CI image pipeline, or a server-side render service.
  pull_quote:
    en: Everything that does real work lives in the headless package; the desktop app is just a UI consumer of it.
  numbers:
    - value: "23"
      label:
        en: Languages translated via the default Ollama backend
    - value: "2"
      label:
        en: Pluggable OCR engines — Tesseract.js and PaddleOCR
  approach:
    body:
      en: Every pluggable subsystem sits behind a formal TypeScript interface — OcrAdapter, TranslationAdapter, RegionDetector — so a hosted OCR service, a different translation backend, or a custom region matcher can be swapped in without forking the package. The two-process Electron split keeps the OCR pipeline out of the main-process lifecycle, leaving it testable and embeddable.
    steps:
      - en: Detect text regions with OpenCV.js contour analysis, with an Ollama vision LLM fallback.
      - en: OCR each region with Tesseract.js by default, or PaddleOCR for CJK and complex layouts.
      - en: Detect the source language with the franc statistical detector, falling back to an Ollama vision LLM for short or mixed text.
      - en: Translate via Ollama by default, or optional DeepL and LibreTranslate adapters.
      - en: Inpaint the original text and render the translation back into place.
